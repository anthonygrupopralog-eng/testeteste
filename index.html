<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema CT-e</title>

<!-- LIBS CORRETAS -->
/pdf.min.js"></script>
10.1/jszip.min.js"></script>
.5/xlsx.full.min.js"></script>
"></script>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  padding:20px;
}

.drop{
  border:2px dashed #555;
  padding:40px;
  text-align:center;
  cursor:pointer;
  margin-bottom:10px;
}

button{
  margin:5px;
  padding:10px;
  background:#2563eb;
  color:#fff;
  border:none;
}

table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

td,th{
  padding:8px;
  border-bottom:1px solid #333;
}

.idr{color:red}
.erro{background:#7f1d1d}
</style>
</head>

<body>

<h1>Sistema CT-e (FUNCIONAL)</h1>

<div class="drop" id="drop">Arraste PDFs aqui</div>

<button onclick="processar()">Processar</button>
<button onclick="baixarZIP()">ZIP</button>
<button onclick="exportarExcel()">Excel</button>

<input placeholder="Buscar..." id="busca" oninput="filtrar()">

<table>
<thead>
<tr>
<th>CTE</th>
<th>ID</th>
<th>Motorista</th>
<th>Nome</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

let arquivos=[];
let dados=[];

// DRAG
drop.ondrop=e=>{
  e.preventDefault();
  arquivos=[...e.dataTransfer.files];
};

drop.ondragover=e=>e.preventDefault();

// EXTRAIR TEXTO
async function ler(file){
  const pdf = await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
  let texto="";
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const content=await page.getTextContent();
    texto+=content.items.map(i=>i.str).join(" ");
  }
  return texto;
}

// EXTRATOR INTELIGENTE
function extrair(texto){

  let cte =
    (texto.match(/NÚMERO\s+(\d+)/i)||[])[1] || "SEM";

  let m = texto.match(/(IDR?)\s+([A-Z0-9\-]+)/i);
  let tipo = m ? m[1] : "ID";
  let id = m ? m[2] : "SEM";

  let motorista =
    (texto.match(/Motorista:\s*(.*?)\s*-/i)||[])[1] || "SEM";

  motorista = motorista.trim();

  let erros=[];
  if(cte==="SEM") erros.push(1);
  if(id==="SEM") erros.push(1);

  return {cte,tipo,id,motorista,erros};
}

// PROCESSAR
async function processar(){
  dados=[];
  tabela.innerHTML="";

  for(let f of arquivos){
    let texto = await ler(f);
    let d = extrair(texto);

    d.nome=`CTE ${d.cte} - ${d.tipo} ${d.id} - ${d.motorista}.pdf`;
    d.file=f;

    dados.push(d);
  }

  render();
}

// RENDER
function render(){
  tabela.innerHTML="";

  dados.forEach(d=>{
    tabela.innerHTML+=`
    <tr class="${d.erros.length?'erro':''}">
      <td>${d.cte}</td>
      <td class="${d.tipo==='IDR'?'idr':''}">
        ${d.tipo} ${d.id}
      </td>
      <td>${d.motorista}</td>
      <td>${d.nome}</td>
    </tr>`;
  });
}

// FILTRO
function filtrar(){
  let t=busca.value.toLowerCase();

  document.querySelectorAll("#tabela tr").forEach(tr=>{
    tr.style.display =
      tr.innerText.toLowerCase().includes(t) ? "" : "none";
  });
}

// ZIP
async function baixarZIP(){
  const zip = new JSZip();

  for(let d of dados){
    const bytes = await d.file.arrayBuffer();
    zip.file(d.nome, bytes);
  }

  const blob = await zip.generateAsync({type:"blob"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="CTEs.zip";
  a.click();
}

// EXCEL
function exportarExcel(){
  let ws = XLSX.utils.json_to_sheet(dados);
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "dados");
  XLSX.writeFile(wb, "CTEs.xlsx");
}

</script>

</body>
</html>
