<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 Sistema CT-e Profissional</title>

<!-- LIBS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
body{
  font-family:'Segoe UI';
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#fff;
  padding:20px;
}
h1{margin-bottom:20px}

/* DASHBOARD */
.dashboard{display:flex;gap:15px;margin-bottom:15px}
.card{
  flex:1;
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  text-align:center;
}
.card h2{margin:0;font-size:26px}
.card span{font-size:12px;color:#94a3b8}

/* AREA */
.drop{
  border:2px dashed #475569;
  padding:40px;
  text-align:center;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}
.drop:hover{background:#1e293b;transform:scale(1.02)}

button{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:#fff;
  cursor:pointer;
}
button:hover{background:#1d4ed8}

/* TABLE */
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{padding:8px;border-bottom:1px solid #333}
th{background:#1e293b}

.idr{color:#f87171;font-weight:bold}
.erro{background:#7f1d1d}

.hist{margin-top:20px;background:#1e293b;padding:10px;border-radius:10px}
</style>
</head>

<body>

<h1>🚀 Sistema Inteligente de CT-e</h1>

<div class="dashboard">
  <div class="card"><h2 id="tot">0</h2><span>Total</span></div>
  <div class="card"><h2 id="id">0</h2><span>ID</span></div>
  <div class="card"><h2 id="idr">0</h2><span>IDR</span></div>
</div>

<div class="drop" id="drop">📄 Arraste seus PDFs aqui</div>

<button onclick="processar()">Processar</button>
<button onclick="excel()">Excel</button>
<button onclick="zip()">ZIP</button>
<button onclick="juntar()">Juntar Motorista</button>
<button onclick="limpar()">Limpar</button>

<br><br>
<input id="busca" placeholder="Buscar..." oninput="filtrar()">

<table>
<thead>
<tr>
<th>CTE</th>
<th>ID</th>
<th>Motorista</th>
<th>Nome</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<div class="hist">
<h3>📜 Histórico</h3>
<ul id="hist"></ul>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

let arquivos=[];
let resultados=[];

// DRAG
drop.ondrop=e=>{
  e.preventDefault();
  arquivos=[...e.dataTransfer.files];
  alert("Arquivos carregados: "+arquivos.length);
};
drop.ondragover=e=>e.preventDefault();

// EXTRATOR INTELIGENTE
function extrair(texto){

  let cte =
    (texto.match(/NÚMERO\s+([\d\.]+)/i) ||
     texto.match(/N[ÚU]MERO:\s*(\d+)/i) ||
     [])[1] || "SEM";

  let m = texto.match(/(IDR?)\s+([A-Z0-9\-]+)/i);
  let tipo = m ? m[1] : "ID";
  let id = m ? m[2] : "SEM";

  let motorista =
    (texto.match(/Motorista:\s*(.*?)\s*-/i) ||
     texto.match(/Condutor:\s*(.*?)\s*CPF/i) ||
     [])[1] || "SEM"; let data =
    (texto.match(/\b(\d{2}\/\d{2}\/\d{4})\b/) || [])[1] || "";

  if(data){
    let p=data.split("/");
    data = p[0]+"-"+p[1];
  }

  let erros=[];
  if(cte==="SEM") erros.push("CTE");
  if(id==="SEM") erros.push("ID");
  if(motorista==="SEM") erros.push("MOTORISTA");

  return {cte,tipo,id,motorista,pedido,carga,data,erros};
}

// EXTRAIR TEXTO
async function txt(file){
  const pdf=await pdfjsLib.getDocument({data:await file.arrayBuffer()}).promise;
  let t="";
  for(let i=1;i<=pdf.numPages;i++){
    const p=await pdf.getPage(i);
    const c=await p.getTextContent();
    t+=c.items.map(i=>i.str).join(" ");
  }
  return t;
}

// PROCESSAR
async function processar(){
  resultados=[];
  tabela.innerHTML="";

  for(let f of arquivos){
    let texto=await txt(f);
    let d=extrair(texto);

    let nome=`CTE ${d.cte}`;
    nome+=` - ${d.tipo} ${d.id}`;

    if(d.pedido) nome+=` - PED ${d.pedido}`;
    if(d.carga) nome+=` - C ${d.carga}`;
    if(d.data) nome+=` - ${d.data}`;

    nome+=` - ${d.motorista}.pdf`;

    d.nome=nome;
    d.file=f;

    resultados.push(d);
  }

  render();
  salvarHist();
}

// RENDER
function render(){
  let t=0,idCount=0,idrCount=0;

  resultados.forEach(r=>{
    t++;
    if(r.tipo==="IDR") idrCount++; else idCount++;

    tabela.innerHTML+=`
    <tr class="${r.erros.length?'erro':''}">
      <td>${r.cte}</td>
      <td class="${r.tipo==='IDR'?'idr':''}">
        ${r.tipo} ${r.id}
      </td>
      <td>${r.motorista}</td>
      <td>${r.nome}</td>
    </tr>`;
  });

  tot.innerText=t;
  id.innerText=idCount;
  idr.innerText=idrCount;

  let erros = resultados.filter(x=>x.erros.length).length;
  if(erros) alert("⚠️ "+erros+" arquivo(s) com erro");
}

// FILTRO
function filtrar(){
  let t=busca.value.toLowerCase();
  document.querySelectorAll("#tabela tr").forEach(tr=>{
    tr.style.display=tr.innerText.toLowerCase().includes(t)?"":"none";
  });
}

// ZIP
async function zip(){
  let zip=new JSZip();
  for(let r of resultados){
    zip.file(r.nome,await r.file.arrayBuffer());
  }
  let blob=await zip.generateAsync({type:"blob"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="CTEs.zip";
  a.click();
}

// EXCEL
function excel(){
  let ws=XLSX.utils.json_to_sheet(resultados);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Dados");
  XLSX.writeFile(wb,"CTEs.xlsx");
}

// JUNTAR
async function juntar(){
  const { PDFDocument } = PDFLib;
  let grupos={};

  resultados.forEach(r=>{
    if(!grupos[r.motorista]) grupos[r.motorista]=[];
    grupos[r.motorista].push(r);
  });

  for(let m in grupos){
    let pdfFinal=await PDFDocument.create();

    for(let i of grupos[m]){
      let pdf=await PDFDocument.load(await i.file.arrayBuffer());
      let pags=await pdfFinal.copyPages(pdf,pdf.getPageIndices());
      pags.forEach(p=>pdfFinal.addPage(p));
    }

    let bytes=await pdfFinal.save();
    let a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([bytes]));
    a.download="CTEs "+m+".pdf";
    a.click();
  }
}

// HISTÓRICO
function salvarHist(){
  let h=JSON.parse(localStorage.getItem("hist")||"[]");

  h.unshift({
    data:new Date().toLocaleString(),
    total:resultados.length
  });

  localStorage.setItem("hist",JSON.stringify(h.slice(0,10)));
  mostrarHist();
}

function mostrarHist(){
  let h=JSON.parse(localStorage.getItem("hist")||"[]");
  hist.innerHTML="";
  h.forEach(x=>{
    hist.innerHTML+=`<li>${x.data} - ${x.total} arquivos</li>`;
  });
}

mostrarHist();

// LIMPAR
function limpar(){
  arquivos=[];
  resultados=[];
  tabela.innerHTML="";
}
</script>

</body>
</html>
